<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Detector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="logo" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="#6C5CE7"/>
          <path d="M9 7L17 12L9 17V7Z" fill="white"/>
        </svg>
        <h1>Video Detector</h1>
      </div>
      <button id="clearBtn" class="btn-icon" title="Clear all">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M5.333 4V2.667a1.333 1.333 0 011.334-1.334h2.666a1.333 1.333 0 011.334 1.334V4m2 0v9.333a1.333 1.333 0 01-1.334 1.334H4.667a1.333 1.333 0 01-1.334-1.334V4h9.334z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <!-- Video list -->
    <div id="videoList" class="video-list">
      <!-- Populated by JS -->
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="23" stroke="#DDD" stroke-width="2" stroke-dasharray="4 4"/>
        <path d="M20 16L32 24L20 32V16Z" fill="#CCC"/>
      </svg>
      <p class="empty-title">No videos detected</p>
      <p class="empty-subtitle">Browse a page with video content — detection is automatic.</p>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span id="videoCount">0 videos</span>
      <span class="footer-dot">&middot;</span>
      <span id="pageUrl" class="page-url" title=""></span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
