<!DOCTYPE html>
<html>
<head><title>Saving video...</title>
<style>
  body { font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a2e; color: #fff; }
  .msg { text-align: center; max-width: 400px; }
  .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #6C5CE7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status { margin-bottom: 8px; }
  #detail { font-size: 12px; color: #888; }
</style>
</head>
<body>
<div class="msg">
  <div class="spinner" id="spinner"></div>
  <div id="status">Preparing download...</div>
  <div id="detail"></div>
</div>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const cacheUrl = params.get('cache');
  const filename = params.get('name') || 'video.ts';
  const status = document.getElementById('status');
  const detail = document.getElementById('detail');

  if (!cacheUrl) {
    status.textContent = 'Error: no cache key provided';
    status.style.color = '#E17055';
    return;
  }

  try {
    detail.textContent = 'Opening cache...';
    const cache = await caches.open('hls-downloads');

    detail.textContent = 'Reading cached data...';
    const resp = await cache.match(cacheUrl);

    if (!resp) {
      // List all keys for debugging
      const keys = await cache.keys();
      const keyUrls = keys.map(r => r.url);
      console.log('Cache keys:', keyUrls);
      console.log('Looking for:', cacheUrl);
      throw new Error('No data in cache. Keys found: ' + keyUrls.length);
    }

    detail.textContent = 'Converting to blob...';
    const blob = await resp.blob();
    detail.textContent = 'Blob ready: ' + (blob.size / 1024 / 1024).toFixed(1) + ' MB';

    // Clean up cache
    await cache.delete(cacheUrl);

    status.textContent = 'Starting download...';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();

    status.textContent = 'Download started!';
    detail.textContent = 'You can close this tab.';
    document.getElementById('spinner').style.display = 'none';
    setTimeout(() => { URL.revokeObjectURL(url); window.close(); }, 5000);
  } catch (e) {
    console.error('Save page error:', e);
    status.textContent = 'Error: ' + e.message;
    status.style.color = '#E17055';
    document.getElementById('spinner').style.display = 'none';
  }
})();
</script>
</body>
</html>
